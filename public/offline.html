<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ขออภัย ระบบขัดข้อง</title>
    <style>
      :root {
        --btn-primary: oklch(0.645 0.246 16.439);
        --btn-primary-hover: oklch(0.58 0.22 16.439);
        --btn-foreground: oklch(0.98 0.01 106.42);
      }
      body {
        font-family: sans-serif;
        text-align: center;
        padding: 50px;
        color: #333;
      }
      .icon {
        font-size: 50px;
        margin-bottom: 20px;
      }
      button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        white-space: nowrap;
        padding: 0.5rem 1rem;
        font-size: 0.875rem;
        font-weight: 500;
        border-radius: 0.5rem;

        background-color: var(--btn-primary);
        color: var(--btn-foreground);
        border: none;
        cursor: pointer;
        box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);

        transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        outline: none;
      }

      img {
        max-width: 250px;
      }
    </style>
  </head>
  <body>
    <div class="icon"><img src="./pim.png" alt="" /></div>
    <h1>ดูเหมือนแอปจะไม่ได้เชื่อมต่อ</h1>
    <p>ขณะนี้ระบบขัดข้องหรือคุณกำลังออฟไลน์อยู่ กรุณาลองใหม่ในภายหลัง</p>
    <button onclick="window.location.reload()">ลองใหม่อีกครั้ง</button>
  </body>
</html>
