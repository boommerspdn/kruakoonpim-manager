services:
  postgres-kruakoonpim: 
    image: postgres:15
    # ... (rest of your DB config)
  # Node.js service (use with: docker compose up nextjs-standalone --build)
  nextjs-standalone:
    build:
      context: .
      dockerfile: Dockerfile
      # These args match your .env to pass into the Dockerfile build process
      args:
        - GEMINI_API_KEY=${GEMINI_API_KEY}
        - LOGIN_PASSCODE=${LOGIN_PASSCODE}
        - INTERNAL_API_KEY=${INTERNAL_API_KEY}
        - DATABASE_URL=${DATABASE_URL}
        - POSTGRES_USER=${POSTGRES_USER}
        - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    image: nextjs-standalone-image
    container_name: nextjs-standalone-container
    depends_on:
      - postgres-kruakoonpim
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: "3000"
      # FIXED: Changed 'localhost:5332' to 'db:5432'
      DATABASE_URL: postgresql://kruakoonpim:Smilez12@db:5432/kruakoonpim?schema=public
      
    ports:
      - "3000:3000"
    restart: unless-stopped

  # Bun service (use with: docker compose up nextjs-standalone-with-bun --build)
  nextjs-standalone-with-bun:
    build:
      context: .
      dockerfile: Dockerfile.bun
    image: nextjs-standalone-bun-image
    container_name: nextjs-standalone-bun-container
    environment:
      NODE_ENV: production
      PORT: "3000"
    ports:
      # FIXED: Changed to 3001 so it doesn't conflict with the Node service
      - "3001:3000" 
    restart: unless-stopped