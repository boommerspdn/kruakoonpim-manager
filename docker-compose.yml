services:
  web:
    build: 
      context: .
      args:
        - LOGIN_PASSCODE=${LOGIN_PASSCODE}
        - INTERNAL_API_KEY=${INTERNAL_API_KEY}
        - DATABASE_URL=${DATABASE_URL}
        - GEMINI_API_KEY=${GEMINI_API_KEY}
    # - GOOGLE_CLOUD_PROJECT=${GOOGLE_CLOUD_PROJECT}
    # - GOOGLE_CLOUD_LOCATION=${GOOGLE_CLOUD_LOCATION}
    # - GOOGLE_GENAI_USE_VERTEXAI=${GOOGLE_GENAI_USE_VERTEXAI}
    # - GOOGLE_CLOUD_STORAGE_BUCKET=${GOOGLE_CLOUD_STORAGE_BUCKET}
    # - GOOGLE_GENAI_MODEL=${GOOGLE_GENAI_MODEL}
    container_name: kruakoonpim-manager
    ports:
    - "3000:3000"
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - HOSTNAME=0.0.0.0
      - PORT=3000
      - DATABASE_URL=${DATABASE_URL}
    # - GOOGLE_APPLICATION_CREDENTIALS=/app/config/gcloud/application_default_credentials.json
    # volumes:
    #   - "C:/Users/Boomm/AppData/Roaming/gcloud:/app/config/gcloud:ro"
    networks:
      - app-tier
      - db-tier   # <--- Added back so Next.js can see the database

networks:
  app-tier:
    driver: bridge
  db-tier:        # <--- Re-linked your external database network
    external: true
    name: kruakoonpim-manager_db